name: Release

on:
  workflow_run:
    workflows: ["macOS Test"]
    types:
      - completed
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  check-workflows:
    name: Check All Workflows Status
    runs-on: ubuntu-latest
    # Run for every trigger so release/workflow_dispatch can't bypass CI gating
    outputs:
      all-success: ${{ steps.check.outputs.all-success }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Wait for all workflows and check status
        id: check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            // Resolve the SHA we're gating on based on the trigger
            let headSha;
            if (context.eventName === 'workflow_run') {
              const workflowRun = context.payload.workflow_run;
              headSha = workflowRun.head_sha;
              console.log(`Triggered by workflow_run "${workflowRun.name}" (conclusion: ${workflowRun.conclusion})`);
            } else if (context.eventName === 'release') {
              // For `release` events GITHUB_SHA is the SHA of the commit that
              // was tagged. `target_commitish` on the release object can be
              // a branch name (e.g. "main"), not a SHA, so filtering
              // workflow_runs by it would miss runs and block legitimate
              // releases. Resolve via the tag ref instead.
              const tagName = context.payload.release.tag_name;
              try {
                const { data: ref } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${tagName}`
                });
                // Lightweight tags return commit directly; annotated tags need deref
                if (ref.object.type === 'commit') {
                  headSha = ref.object.sha;
                } else {
                  const { data: tag } = await github.rest.git.getTag({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    tag_sha: ref.object.sha
                  });
                  headSha = tag.object.sha;
                }
              } catch (err) {
                console.log(`Could not resolve tag ${tagName} via API, falling back to context.sha`);
                headSha = context.sha;
              }
              console.log(`Triggered by release (tag: ${tagName})`);
            } else if (context.eventName === 'workflow_dispatch') {
              headSha = context.sha;
              console.log(`Triggered by workflow_dispatch on ref: ${context.ref}`);
            } else {
              throw new Error(`Unsupported trigger: ${context.eventName}`);
            }
            console.log(`Gating on commit: ${headSha}`);
            
            // Required workflows that must succeed
            const requiredWorkflows = ['Checks', 'macOS Test', 'Security Scan'];
            
            // Wait a bit for all workflows to complete (they might finish almost simultaneously)
            await new Promise(resolve => setTimeout(resolve, 10000));
            
            // Get all workflow runs for this commit
            let allCompleted = false;
            let attempts = 0;
            const maxAttempts = 30; // Wait up to 5 minutes (30 * 10 seconds)
            
            while (!allCompleted && attempts < maxAttempts) {
              attempts++;
              const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: headSha,
                per_page: 100
              });
              
              const workflowStatuses = {};
              
              // Check status of all required workflows
              for (const run of runs.workflow_runs) {
                if (requiredWorkflows.includes(run.name)) {
                  workflowStatuses[run.name] = {
                    status: run.status,
                    conclusion: run.conclusion,
                    id: run.id
                  };
                }
              }
              
              // Check if all required workflows are present and completed
              allCompleted = true;
              let allSuccess = true;
              
              for (const reqWorkflow of requiredWorkflows) {
                const status = workflowStatuses[reqWorkflow];
                if (!status) {
                  console.log(`WAITING: Workflow "${reqWorkflow}" not found yet (attempt ${attempts}/${maxAttempts})`);
                  allCompleted = false;
                  break;
                }
                
                if (status.status !== 'completed') {
                  console.log(`WAITING: Workflow "${reqWorkflow}" is still running (status: ${status.status}, attempt ${attempts}/${maxAttempts})`);
                  allCompleted = false;
                  break;
                }
                
                if (status.conclusion !== 'success') {
                  console.log(`ERROR: Workflow "${reqWorkflow}" failed (conclusion: ${status.conclusion})`);
                  allSuccess = false;
                } else {
                  console.log(`OK: Workflow "${reqWorkflow}" succeeded`);
                }
              }
              
              if (allCompleted) {
                if (!allSuccess) {
                  console.log('ERROR: One or more workflows failed. Release will not be created.');
                  core.setOutput('all-success', 'false');
                  return;
                }
                break;
              }
              
              // Wait before next check
              if (attempts < maxAttempts) {
                console.log(`Waiting 10 seconds before next check... (attempt ${attempts}/${maxAttempts})`);
                await new Promise(resolve => setTimeout(resolve, 10000));
              }
            }
            
            if (!allCompleted) {
              console.log('TIMEOUT: Not all workflows completed within the timeout period. Release will not be created.');
              core.setOutput('all-success', 'false');
              return;
            }
            
            console.log('OK: All required workflows succeeded! Proceeding with release...');
            core.setOutput('all-success', 'true');

  create-release:
    name: Create Release Package
    runs-on: ubuntu-latest
    needs: [check-workflows]
    # Gate on check-workflows for every trigger. A failing or skipped check
    # blocks release artifact publication (closes a supply-chain bypass).
    if: needs.check-workflows.outputs.all-success == 'true'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            # Auto-generate version based on date and commit SHA
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT_SHA="${COMMIT_SHA:0:7}"
            DATE=$(date +%Y.%m.%d)
            VERSION="v${DATE}-${SHORT_SHA}"
            echo "Auto-generated version: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create release package
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_NAME="macsmith-${VERSION}"

          # Use `git archive` so release packaging respects .gitattributes
          # export-ignore rules (single source of truth for what ships).
          # --worktree-attributes reads .gitattributes from the working tree
          # rather than the committed version, so a PR bumping the rules
          # takes effect immediately.
          git archive \
            --format=tar \
            --worktree-attributes \
            --prefix="${PACKAGE_NAME}/" \
            HEAD \
            | tar -x

          # Write the resolved version into the package so install.sh can read
          # it without .git or API calls (avoids the "installing an older zip
          # but reporting latest release" version-drift bug).
          printf '%s\n' "$VERSION" > "$PACKAGE_NAME/VERSION"

          # Create zip (git archive gave us a clean directory; no extra excludes needed)
          (cd "$PACKAGE_NAME" && zip -qr "../${PACKAGE_NAME}.zip" .)

          # Create checksum
          sha256sum "${PACKAGE_NAME}.zip" > "${PACKAGE_NAME}.zip.sha256"
          
          # Set outputs
          echo "zip_file=${PACKAGE_NAME}.zip" >> $GITHUB_OUTPUT
          echo "checksum_file=${PACKAGE_NAME}.zip.sha256" >> $GITHUB_OUTPUT
          
          # Read checksum content for release notes
          CHECKSUM_CONTENT=$(cat "${PACKAGE_NAME}.zip.sha256")
          echo "checksum_content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHECKSUM_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## macsmith ${{ steps.version.outputs.version }}
            
            ### Installation
            1. Download and extract the zip file
            2. Run `./install.sh` for shell setup (Oh My Zsh, terminal config)
            3. (Optional) Run `./dev-tools.sh` to install package managers and language tools
            
            ### Files included
            Packaged with `git archive` respecting `.gitattributes` `export-ignore` rules.
            Excluded from the release zip: `.github/`, `.vscode/`, `.claude/`, `.gitignore`, `.gitattributes`, `quick-test.sh`, `CLAUDE.md`.

            Main files:
            - `install.sh` — Shell setup installation script
            - `dev-tools.sh` — Language tools installer (pyenv, nvm, chruby, rustup, swiftly, uv, bun, pnpm, deno, …)
            - `bootstrap.sh` — One-liner bootstrap (clones + runs install.sh)
            - `zsh.sh` — Zsh configuration installed as `~/.zshrc`
            - `macsmith.sh` — The maintenance binary (becomes `~/.local/bin/macsmith`)
            - `config/starship.toml` — Default Starship prompt config
            - `scripts/` — Nix maintenance helper
            - `background/` — Terminal background images (referenced by Ghostty config)
            - `README.md`, `LICENSE`, `Ghostty config.txt`
            - `VERSION` — Injected by the release pipeline so `install.sh` knows what it is
            
            ### Checksums
            ```
            ${{ steps.package.outputs.checksum_content }}
            ```
          files: |
            ${{ steps.package.outputs.zip_file }}
            ${{ steps.package.outputs.checksum_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-package
          path: |
            ${{ steps.package.outputs.zip_file }}
            ${{ steps.package.outputs.checksum_file }}
